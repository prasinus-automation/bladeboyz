<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231a1a2e'/%3E%3Cg stroke='%23c0c0c0' stroke-width='2' stroke-linecap='round'%3E%3Cline x1='7' y1='5' x2='22' y2='20' /%3E%3Cline x1='25' y1='5' x2='10' y2='20' /%3E%3C/g%3E%3Cg stroke='%238b7355' stroke-width='2.5' stroke-linecap='round'%3E%3Cline x1='22' y1='20' x2='26' y2='24' /%3E%3Cline x1='10' y1='20' x2='6' y2='24' /%3E%3C/g%3E%3Cg stroke='%23c0c0c0' stroke-width='1'%3E%3Cline x1='19' y1='18' x2='25' y2='18' /%3E%3Cline x1='7' y1='18' x2='13' y2='18' /%3E%3C/g%3E%3C/svg%3E">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>BladeBoyz</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; width: 100%; height: 100%; }
      #click-to-play {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-family: monospace;
        font-size: 24px;
        cursor: pointer;
        z-index: 100;
        user-select: none;
      }
      #click-to-play.hidden { display: none; }
      #crosshair {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 2px; height: 2px;
        background: #fff;
        box-shadow: 0 -6px 0 #fff, 0 6px 0 #fff, -6px 0 0 #fff, 6px 0 0 #fff;
        z-index: 10;
        pointer-events: none;
      }
      #debug-overlay {
        position: fixed;
        top: 8px; left: 8px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
        white-space: pre;
      }
      #camera-mode-indicator {
        position: fixed;
        top: 8px; right: 8px;
        color: #ff0;
        font-family: monospace;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="click-to-play">Click to Play</div>
    <div id="crosshair"></div>
    <div id="debug-overlay"></div>
    <div id="camera-mode-indicator">FPS</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
