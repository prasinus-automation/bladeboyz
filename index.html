<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BladeBoyz</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; width: 100%; height: 100%; }
      #click-to-play {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-family: monospace;
        font-size: 24px;
        cursor: pointer;
        z-index: 100;
        user-select: none;
      }
      #click-to-play.hidden { display: none; }
      #crosshair {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 2px; height: 2px;
        background: #fff;
        box-shadow: 0 -6px 0 #fff, 0 6px 0 #fff, -6px 0 0 #fff, 6px 0 0 #fff;
        z-index: 10;
        pointer-events: none;
      }
      #debug-overlay {
        position: fixed;
        top: 8px; left: 8px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
        white-space: pre;
      }
      #camera-mode-indicator {
        position: fixed;
        top: 8px; right: 8px;
        color: #ff0;
        font-family: monospace;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="click-to-play">Click to Play</div>
    <div id="crosshair"></div>
    <div id="debug-overlay"></div>
    <div id="camera-mode-indicator">FPS</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
